  <!-- orange crossbar through the tt -->
  <rect x="36" y="17" width="34" height="8" rx="2.5" fill="#F15A22" />
  <!-- violet dot -->
  <circle cx="63" cy="9.5" r="4.6" fill="#5512E0" />
