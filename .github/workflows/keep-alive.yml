name: keep-alive

# Keeps the free Render instance awake by pinging it on a schedule, so staff
# don't hit the ~30-60s "waking up" page. Remove this file (or the schedule)
# once you upgrade Render to an always-on plan.
on:
  schedule:
    - cron: "*/14 * * * *" # every 14 minutes (Render sleeps after ~15 min idle)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          curl -fsS --max-time 90 https://attnd-backoffice.onrender.com/login > /dev/null \
            && echo "Pinged OK" \
            || echo "Ping failed (instance may be starting) — will retry next run"
